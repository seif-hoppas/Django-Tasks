<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seif's Kitchen</title>
</head>
<body style="font-family: sans-serif; max-width: 700px; margin: 20px auto;">
    <h1><b>Seif's Kitchen</b></h1>

<form method="get">
    <input type="text" name="q" value="{{ query }}" placeholder="Search...">

    <select name="category">
        <option value="">All Categories</option>
        {% for c in categories %}
            <option value="{{ c }}" {% if current_category == c %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
    </select>

    <button type="submit">Search</button>
</form>

{% for item in items %}
    <div style="background: #f5f5f5; padding: 15px 20px; margin: 15px 0; border-radius: 8px;">
        <h2>{{ item.name }}</h2>
        <p>Category: {{ item.category }}</p>
        <p>Price: {{ item.price }} EGP</p>
        {% if item.available %}
            <p style="color: green; font-weight: bold;">Available &#9989;</p>
        {% else %}
            <p style="color: red; font-weight: bold;">Not Available &#10060;</p>
        {% endif %}
    </div>
{% empty %}
    <p>No items found.</p>
{% endfor %}

</body>
</html>
